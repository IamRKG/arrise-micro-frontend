name: Deploy MFEs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      host: ${{ steps.changes.outputs.host }}
      product: ${{ steps.changes.outputs.product }}
      checkout: ${{ steps.changes.outputs.checkout }}
      cart: ${{ steps.changes.outputs.cart }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            host:
              - 'apps/host/**'
              - 'packages/**'
            product:
              - 'apps/product/**'
              - 'packages/**'
            checkout:
              - 'apps/checkout/**'
              - 'packages/**'
            cart:
              - 'apps/cart/**'
              - 'packages/**'

  deploy-product:
    needs: detect-changes
    if: needs.detect-changes.outputs.product == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PRODUCT_PROJECT_ID }}
          working-directory: apps/product
          vercel-args: '--prod'

  deploy-checkout:
    needs: detect-changes
    if: needs.detect-changes.outputs.checkout == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_CHECKOUT_PROJECT_ID }}
          working-directory: apps/checkout
          vercel-args: '--prod'

  deploy-cart:
    needs: detect-changes
    if: needs.detect-changes.outputs.cart == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_CART_PROJECT_ID }}
          working-directory: apps/cart
          vercel-args: '--prod'

  deploy-host:
    needs: [detect-changes, deploy-product, deploy-checkout, deploy-cart]
    if: |
      always() &&
      needs.detect-changes.outputs.host == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_HOST_PROJECT_ID }}
          working-directory: apps/host
          vercel-args: '--prod'
        env:
          PRODUCT_URL: ${{ vars.PRODUCT_URL }}
          CHECKOUT_URL: ${{ vars.CHECKOUT_URL }}
          CART_URL: ${{ vars.CART_URL }}
